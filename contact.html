<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ishaku Andrawus | Contact</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">
                <div class="logo-circle"></div>
                Academic<span>Port.</span>
            </div>
            
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Me</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="planner.html">Planner</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>

            <div class="theme-toggle">
                <button id="mode-btn" title="Toggle Mode"><i class="fas fa-moon"></i></button>
            </div>
        </nav>
    </header>

    <main class="page-container">
        <h1 class="page-title">Get In <span>Touch</span></h1>
        <p class="section-intro">Have a question or want to collaborate on a project? Send me a message!</p>
        
        <div class="contact-box">
            <form id="contact-form" class="contact-form" novalidate>
                
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="John Doe">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="john@example.com">
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" placeholder="08012345678">
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" rows="5" placeholder="Write your message here..."></textarea>
                </div>

                <div id="form-status" class="form-status"></div>

                <button type="submit" class="btn primary-btn"><i class="fas fa-paper-plane"></i> Send Message</button>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
